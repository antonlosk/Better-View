name: Build Better View

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt 6.10.1 with MSVC
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.1'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        setup-python: 'true'
        aqtversion: '==3.3.0'
        py7zrversion: '==0.22.*'
        tools: 'tools_ifw'

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: 'x64'

    - name: Build with qmake
      run: |
        mkdir build
        cd build
        qmake ../BetterView.pro
        nmake

    - name: Get version from version.h
      id: get_version
      run: |
        $content = Get-Content version.h -Raw
        if ($content -match '#define VERSION_STRING "([0-9.]+)"') {
          $ver = $matches[1]
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        } else {
          echo "version=dev" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh

    - name: Deploy Qt dependencies
      shell: pwsh
      run: |
        # Используем известный путь из логов предыдущих сборок
        $qtBase = "D:\a\_temp\Qt\6.10.1\msvc2022_64"
        if (-not (Test-Path $qtBase)) {
          # Fallback через runner.temp
          $qtBase = "${{ runner.temp }}\Qt\6.10.1\msvc2022_64"
        }
        $qtBin = "$qtBase\bin"
        Write-Host "Qt bin path: $qtBin"
        $deployDir = "deploy"
        New-Item -ItemType Directory -Force -Path $deployDir
        Copy-Item "build\release\BetterView.exe" -Destination $deployDir
        & "$qtBin\windeployqt.exe" --dir $deployDir $deployDir\BetterView.exe
        Copy-Item "icons\icon.ico" -Destination "installer\config\icon.ico" -Force

    - name: Create portable ZIP
      shell: pwsh
      run: |
        $ver = "${{ steps.get_version.outputs.version }}"
        Compress-Archive -Path deploy\* -DestinationPath BetterView-$ver-portable.zip

    - name: Create installer
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $date = (Get-Date -Format "yyyy-MM-dd")
        (Get-Content installer/config/config.xml) -replace '%VERSION%', $version | Set-Content installer/config/config.xml
        (Get-Content installer/packages/com.betterview/meta/package.xml) -replace '%VERSION%', $version | Set-Content installer/packages/com.betterview/meta/package.xml
        (Get-Content installer/packages/com.betterview/meta/package.xml) -replace '%DATE%', $date | Set-Content installer/packages/com.betterview/meta/package.xml
        $dataDir = "installer/packages/com.betterview/data"
        New-Item -ItemType Directory -Force -Path $dataDir
        Copy-Item -Path "deploy\*" -Destination $dataDir -Recurse
        $ifwPath = Get-ChildItem -Path "${{ runner.temp }}\Qt\Tools\QtInstallerFramework" -Directory | Select-Object -First 1
        if (-not $ifwPath) {
          $ifwPath = "D:\a\_temp\Qt\Tools\QtInstallerFramework\4.7"
        }
        & "$ifwPath\bin\binarycreator.exe" -c installer/config/config.xml -p installer/packages BetterView-Setup-$version.exe

    - name: Determine release tag and name
      id: release_info
      run: |
        $ver = "${{ steps.get_version.outputs.version }}"
        if ("${{ github.ref_type }}" -eq "tag") {
          $tag = "${{ github.ref_name }}" -replace '^v',''
          echo "release_tag=v$tag" >> $env:GITHUB_OUTPUT
          echo "release_name=Better View $tag" >> $env:GITHUB_OUTPUT
        } else {
          echo "release_tag=v$ver" >> $env:GITHUB_OUTPUT
          echo "release_name=Better View $ver" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh

    - name: Upload artifacts (installer + portable zip)
      uses: actions/upload-artifact@v4
      with:
        name: BetterView-${{ steps.get_version.outputs.version }}
        path: |
          BetterView-Setup-${{ steps.get_version.outputs.version }}.exe
          BetterView-${{ steps.get_version.outputs.version }}-portable.zip

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "BetterView-Setup-${{ steps.get_version.outputs.version }}.exe, BetterView-${{ steps.get_version.outputs.version }}-portable.zip"
        name: "${{ steps.release_info.outputs.release_name }}"
        tag: "${{ steps.release_info.outputs.release_tag }}"
        commit: "${{ github.sha }}"
        allowUpdates: true
        replacesArtifacts: true
        generateReleaseNotes: true
